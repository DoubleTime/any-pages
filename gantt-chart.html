<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Task Gantt Chart</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        #0d0f14;
    --surface:   #13161e;
    --surface2:  #1a1f2b;
    --border:    #252b3a;
    --border2:   #2f3748;
    --text:      #e2e8f4;
    --muted:     #6b7a9a;
    --accent:    #4f8ef7;
    --success:   #36d399;
    --warning:   #f7b84f;
    --danger:    #f7604f;
    --today-line:#f7b84f;
    --row-h:     38px;
    --label-w:   220px;
    --cell-w:    36px;
    --header-h:  88px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── TOP BAR ── */
  .top-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .top-bar h1 {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .top-bar h1 span { color: var(--accent); }

  .badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .spacer { flex: 1; }

  .refresh-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 16px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    transition: all .2s;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 6px var(--success);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: .4; }
  }

  /* ── MAIN WRAP ── */
  .main { padding: 24px 28px 0; }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── LEGEND ── */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 20px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    color: var(--muted);
  }
  .legend-swatch {
    width: 14px; height: 8px;
    border-radius: 3px;
  }

  /* ── GANTT SCROLL WRAPPER ── */
  .gantt-outer {
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    overflow: hidden;
  }

  .gantt-scroll {
    overflow-x: auto;
    overflow-y: visible;
  }

  .gantt-table {
    display: flex;
    flex-direction: column;
    min-width: max-content;
  }

  /* ── HEADER ROW ── */
  .gantt-header {
    display: flex;
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--surface);
    border-bottom: 2px solid var(--border2);
  }

  .gantt-header .label-col {
    width: var(--label-w);
    min-width: var(--label-w);
    border-right: 1px solid var(--border2);
    display: flex;
    align-items: flex-end;
    padding: 10px 14px;
    background: var(--surface);
  }

  .gantt-header .label-col span {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .gantt-header .timeline-cols {
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  .month-row {
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .month-cell {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--muted);
    padding: 6px 0 4px 8px;
    border-right: 1px solid var(--border);
    white-space: nowrap;
  }

  .day-row {
    display: flex;
  }

  .day-cell {
    width: var(--cell-w);
    min-width: var(--cell-w);
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    padding: 4px 0;
    border-right: 1px solid var(--border);
    opacity: .7;
    transition: background .1s;
  }
  .day-cell.weekend  { background: rgba(255,255,255,.02); color: var(--border2); }
  .day-cell.is-today { background: rgba(247,184,79,.1);   color: var(--today-line); font-weight: 700; }

  /* ── PIC GROUP ── */
  .pic-group { border-bottom: 1px solid var(--border2); }

  .pic-header-row {
    display: flex;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .pic-label {
    width: var(--label-w);
    min-width: var(--label-w);
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 9px 14px;
    border-right: 1px solid var(--border2);
    position: sticky;
    left: 0;
    background: var(--surface2);
    z-index: 10;
  }

  .pic-avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 800;
    flex-shrink: 0;
    color: #fff;
  }

  .pic-name {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pic-count {
    font-size: 10px;
    color: var(--muted);
    margin-left: auto;
    flex-shrink: 0;
  }

  .pic-timeline-stripe {
    flex: 1;
    display: flex;
  }

  .pic-stripe-cell {
    width: var(--cell-w);
    min-width: var(--cell-w);
    border-right: 1px solid rgba(255,255,255,.03);
  }
  .pic-stripe-cell.weekend { background: rgba(255,255,255,.015); }
  .pic-stripe-cell.is-today { background: rgba(247,184,79,.06); }

  /* ── TASK ROW ── */
  .task-row {
    display: flex;
    height: var(--row-h);
    border-bottom: 1px solid rgba(255,255,255,.03);
    position: relative;
  }
  .task-row:hover { background: rgba(255,255,255,.02); }

  .task-label-cell {
    width: var(--label-w);
    min-width: var(--label-w);
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 12px 0 22px;
    border-right: 1px solid var(--border);
    position: sticky;
    left: 0;
    background: var(--surface);
    z-index: 10;
    transition: background .15s;
  }
  .task-row:hover .task-label-cell { background: var(--surface2); }

  .task-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .task-name {
    font-size: 11.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    color: #c8d3eb;
  }

  .task-eta-badge {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    background: rgba(255,255,255,.06);
    color: var(--muted);
    flex-shrink: 0;
  }

  /* ── TIMELINE CELLS ── */
  .task-timeline {
    flex: 1;
    display: flex;
    position: relative;
    align-items: center;
  }

  .timeline-bg-cell {
    width: var(--cell-w);
    min-width: var(--cell-w);
    height: 100%;
    border-right: 1px solid rgba(255,255,255,.03);
    flex-shrink: 0;
  }
  .timeline-bg-cell.weekend { background: rgba(255,255,255,.015); }
  .timeline-bg-cell.is-today { background: rgba(247,184,79,.06); }

  /* ── GANTT BAR ── */
  .gantt-bar-wrap {
    position: absolute;
    top: 0; bottom: 0;
    display: flex;
    align-items: center;
    z-index: 5;
  }

  .gantt-bar {
    height: 20px;
    border-radius: 4px;
    position: relative;
    display: flex;
    align-items: center;
    padding: 0 8px;
    cursor: pointer;
    transition: filter .15s, transform .15s;
    min-width: 8px;
    overflow: hidden;
  }
  .gantt-bar::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 4px;
    background: rgba(255,255,255,.1);
    opacity: 0;
    transition: opacity .15s;
  }
  .gantt-bar:hover { filter: brightness(1.25); transform: scaleY(1.1); }
  .gantt-bar:hover::before { opacity: 1; }

  .gantt-bar-label {
    font-size: 10px;
    font-weight: 600;
    color: rgba(255,255,255,.9);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    position: relative;
    z-index: 1;
    pointer-events: none;
  }

  .gantt-bar.auto-queued {
    opacity: .7;
    background-image: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 4px,
      rgba(255,255,255,.07) 4px,
      rgba(255,255,255,.07) 8px
    );
  }

  /* ── TODAY LINE ── */
  .today-line {
    position: absolute;
    top: 0; bottom: 0;
    width: 2px;
    background: var(--today-line);
    z-index: 20;
    pointer-events: none;
    box-shadow: 0 0 8px var(--today-line);
  }

  /* ── TOOLTIP ── */
  .tooltip {
    position: fixed;
    z-index: 9999;
    background: #1e2535;
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 14px 16px;
    min-width: 240px;
    max-width: 320px;
    box-shadow: 0 16px 48px rgba(0,0,0,.6);
    pointer-events: none;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity .15s, transform .15s;
  }
  .tooltip.visible { opacity: 1; transform: translateY(0); }

  .tooltip-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .tooltip-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 5px 12px;
  }

  .tooltip-key {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    white-space: nowrap;
  }
  .tooltip-val {
    font-size: 11.5px;
    color: var(--text);
    font-weight: 500;
  }

  .tooltip-status {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    margin-top: 10px;
    letter-spacing: .5px;
    text-transform: uppercase;
  }
  .tooltip-auto-note {
    margin-top: 8px;
    padding: 6px 9px;
    background: rgba(247,184,79,.08);
    border: 1px solid rgba(247,184,79,.2);
    border-radius: 5px;
    font-size: 10px;
    color: var(--warning);
  }

  /* ── UNSCHEDULED SECTION ── */
  .unscheduled-section {
    margin-top: 36px;
  }

  .unscheduled-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }

  .unscheduled-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color .2s, transform .15s;
    position: relative;
    overflow: hidden;
  }
  .unscheduled-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }
  .unscheduled-card:hover {
    border-color: var(--border2);
    transform: translateY(-2px);
  }

  .uc-top {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .uc-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    opacity: .8;
  }

  .uc-task-name {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.35;
    flex: 1;
  }

  .uc-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }

  .uc-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 10.5px;
    font-weight: 500;
    border: 1px solid transparent;
  }

  .uc-chip.pic-chip {
    background: rgba(79,142,247,.1);
    border-color: rgba(79,142,247,.2);
    color: var(--accent);
  }
  .uc-chip.eta-chip {
    background: rgba(54,211,153,.08);
    border-color: rgba(54,211,153,.2);
    color: var(--success);
  }
  .uc-chip.no-eta-chip {
    background: rgba(247,96,79,.07);
    border-color: rgba(247,96,79,.2);
    color: var(--danger);
  }
  .uc-chip.status-chip {
    background: rgba(255,255,255,.05);
    border-color: var(--border);
    color: var(--muted);
  }

  .no-pic { color: var(--muted); font-style: italic; }
  /* ── UNSCHEDULED PIC GROUP ── */
  .uc-pic-group {
    margin-bottom: 24px;
  }
  .uc-pic-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }


  /* ── LOADING / ERROR ── */
  .state-overlay {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 80px 40px;
    color: var(--muted);
    font-size: 14px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: rgba(247,96,79,.08);
    border: 1px solid rgba(247,96,79,.3);
    border-radius: 8px;
    padding: 16px 20px;
    color: var(--danger);
    max-width: 560px;
    text-align: center;
    line-height: 1.6;
  }

  /* ── SUMMARY STRIP ── */
  .summary-strip {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 18px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-width: 110px;
  }
  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
  }
  .stat-label {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <h1>Task <span>Gantt</span></h1>
  <span class="badge" id="sheet-badge">TASK</span>
  <div class="status-dot" id="status-dot" title="Live from Google Sheets"></div>
  <div class="spacer"></div>
  <button class="refresh-btn" onclick="loadData()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
    Refresh
  </button>
</div>

<!-- MAIN -->
<div class="main" id="main">
  <div class="state-overlay"><div class="spinner"></div><span>Loading from Google Sheets…</span></div>
</div>

<!-- TOOLTIP -->
<div class="tooltip" id="tooltip"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const SHEET_ID  = '1Ln11GvM4lugZ4bXVyRAZi5KA6ZMGCtd30srRDwb-N5A';
const SHEET_TAB = 'TASK';
const CSV_URL   = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_TAB)}`;
const CELL_W    = 36; // px  — must match CSS var(--cell-w)
const LABEL_W   = 220;
const BAR_DATA  = {}; // idx -> task data for tooltip
let   barIdx    = 0;

// ── COLOUR PALETTE ──────────────────────────────────────────────────────────
const PALETTE = [
  '#4f8ef7','#36d399','#f7b84f','#f7604f','#a78bfa',
  '#22d3ee','#fb923c','#e879f9','#84cc16','#f472b6'
];
const picColors = {};
let palIdx = 0;

function getPicColor(pic) {
  if (!pic) return '#6b7a9a';
  const key = pic.trim().toLowerCase();
  if (!picColors[key]) picColors[key] = PALETTE[palIdx++ % PALETTE.length];
  return picColors[key];
}

function initials(name) {
  if (!name) return '?';
  return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0,2);
}

// ── CSV PARSE ────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  let cur = '', inQ = false, row = [];
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') {
      if (inQ && text[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) { row.push(cur); cur = ''; }
    else if ((c === '\n' || c === '\r') && !inQ) {
      if (c === '\r' && text[i+1] === '\n') i++;
      row.push(cur); cur = '';
      rows.push(row); row = [];
    } else cur += c;
  }
  row.push(cur); rows.push(row);
  return rows;
}

// ── DATE HELPERS ─────────────────────────────────────────────────────────────
function parseDate(str) {
  if (!str || !str.trim()) return null;
  const s = str.trim();

  // Try common formats
  // dd/mm/yyyy or mm/dd/yyyy
  let m;
  m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if (m) {
    let [, a, b, y] = m;
    if (y.length === 2) y = '20' + y;
    // Heuristic: if a > 12, it must be dd
    const d = new Date(+y, +b - 1, +a);
    if (!isNaN(d)) return d;
    const d2 = new Date(+y, +a - 1, +b);
    if (!isNaN(d2)) return d2;
  }
  // yyyy-mm-dd
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m) {
    const d = new Date(+m[1], +m[2]-1, +m[3]);
    if (!isNaN(d)) return d;
  }
  // Month name: "Jan 5, 2025" or "5 Jan 2025"
  const d = new Date(s);
  if (!isNaN(d)) return d;
  return null;
}

function addDays(d, n) {
  const r = new Date(d); r.setDate(r.getDate() + n); return r;
}

function daysBetween(a, b) {
  return Math.round((b - a) / 86400000);
}

function fmtDate(d) {
  if (!d) return '—';
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}

function stripTime(d) {
  const r = new Date(d); r.setHours(0,0,0,0); return r;
}

// ── COLUMN FINDER ────────────────────────────────────────────────────────────
function findCol(headers, aliases) {
  for (const a of aliases) {
    const i = headers.findIndex(h => h.toLowerCase().replace(/[\s_\-]/g,'').includes(a.toLowerCase().replace(/[\s_\-]/g,'')));
    if (i >= 0) return i;
  }
  return -1;
}

// ── STATUS COLOUR ────────────────────────────────────────────────────────────
function statusStyle(status) {
  const s = (status || '').toLowerCase();
  if (s.includes('done') || s.includes('complet') || s.includes('finish'))
    return { bg:'rgba(54,211,153,.18)', border:'rgba(54,211,153,.4)', text:'#36d399' };
  if (s.includes('progress') || s.includes('doing') || s.includes('wip'))
    return { bg:'rgba(79,142,247,.18)', border:'rgba(79,142,247,.4)', text:'#4f8ef7' };
  if (s.includes('block') || s.includes('hold') || s.includes('stuck'))
    return { bg:'rgba(247,96,79,.18)', border:'rgba(247,96,79,.4)', text:'#f7604f' };
  if (s.includes('review') || s.includes('test') || s.includes('qa'))
    return { bg:'rgba(167,139,250,.18)', border:'rgba(167,139,250,.4)', text:'#a78bfa' };
  return { bg:'rgba(107,122,154,.12)', border:'rgba(107,122,154,.3)', text:'#6b7a9a' };
}

function statusEmoji(status) {
  const s = (status || '').toLowerCase();
  if (s.includes('done') || s.includes('complet') || s.includes('finish')) return '✅';
  if (s.includes('progress') || s.includes('wip')) return '🔄';
  if (s.includes('block') || s.includes('hold')) return '🚫';
  if (s.includes('review') || s.includes('qa')) return '🔍';
  return '📋';
}

// ── MAIN LOAD ─────────────────────────────────────────────────────────────────
async function loadData() {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="state-overlay"><div class="spinner"></div><span>Loading from Google Sheets…</span></div>';
  document.getElementById('status-dot').style.background = '#f7b84f';

  try {
    const resp = await fetch(CSV_URL + '&cacheBust=' + Date.now());
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error('Sheet appears empty');

    const rawHeaders = rows[0].map(h => h.trim());
    // Map columns
    const cols = {
      task:        findCol(rawHeaders, ['task','name','title','description']),
      pic:         findCol(rawHeaders, ['pic','person','assignee','owner','responsible','who']),
      startAt:     findCol(rawHeaders, ['startat','start','startdate','begin','from','kickoff']),
      completedAt: findCol(rawHeaders, ['completedat','completed','completeat','complete','enddate','end','finishat','finish','closedat']),
      dayUsed:     findCol(rawHeaders, ['dayused','daysused','used','actualday','actualdays','dayspent']),
      eta:         findCol(rawHeaders, ['etamanday','manday','eta','duration','days','effort','estday']),
      status:      findCol(rawHeaders, ['status','state','progress','stage']),
      notes:       findCol(rawHeaders, ['note','notes','remark','comment','desc']),
      priority:    findCol(rawHeaders, ['priority','prio','urgency','importance']),
    };

    // Parse data rows — skip rows where ALL meaningful columns are empty
    const raw = rows.slice(1).filter(r => {
      // Must have at least a task name or a PIC to be considered real
      const taskVal = cols.task    >= 0 ? r[cols.task]?.trim()    : '';
      const picVal  = cols.pic     >= 0 ? r[cols.pic]?.trim()     : '';
      const startVal= cols.startAt >= 0 ? r[cols.startAt]?.trim() : '';
      const etaVal  = cols.eta     >= 0 ? r[cols.eta]?.trim()     : '';
      return !!(taskVal || picVal || startVal || etaVal);
    });
    const tasks = raw.map((r, idx) => ({
      idx,
      task:         cols.task        >= 0 ? r[cols.task]?.trim()        || '' : '',
      pic:          cols.pic         >= 0 ? r[cols.pic]?.trim()         || '' : '',
      startRaw:     cols.startAt     >= 0 ? r[cols.startAt]?.trim()     || '' : '',
      completedRaw: cols.completedAt >= 0 ? r[cols.completedAt]?.trim() || '' : '',
      dayUsedRaw:   cols.dayUsed     >= 0 ? r[cols.dayUsed]?.trim()     || '' : '',
      etaRaw:       cols.eta         >= 0 ? r[cols.eta]?.trim()         || '' : '',
      status:       cols.status      >= 0 ? r[cols.status]?.trim()      || '' : '',
      notes:        cols.notes       >= 0 ? r[cols.notes]?.trim()       || '' : '',
      priority:     cols.priority    >= 0 ? r[cols.priority]?.trim()    || '' : '',
      startDate:    null,
      endDate:      null,
      etaDays:      0,
      dayUsed:      0,
      rangeSource:  '',   // 'completed' | 'dayUsed' | 'eta' | 'auto'
      autoQueued:   false,
    }));

    // Parse dates & raw values
    tasks.forEach(t => {
      t.startDate   = parseDate(t.startRaw);
      t.completedDate = parseDate(t.completedRaw);
      t.dayUsed     = parseFloat(t.dayUsedRaw) || 0;
      t.etaDays     = parseFloat(t.etaRaw)     || 0;
    });

    // Resolve end date per task using priority:
    //   1. Start + Completed At  → use both dates directly
    //   2. Start + Day Used      → start + dayUsed days
    //   3. Start + ETA Man Day   → start + etaDays days
    //   4. Start only            → single day (1d)
    tasks.filter(t => t.startDate).forEach(t => {
      if (t.completedDate) {
        // Rule 1: explicit completed date — use it directly
        t.endDate     = stripTime(t.completedDate);
        t.rangeSource = 'completed';
        // Derive effective days for tooltip display
        t.effectiveDays = Math.max(1, daysBetween(stripTime(t.startDate), t.endDate) + 1);
      } else if (t.dayUsed > 0) {
        // Rule 2: Day Used column has a number
        t.endDate     = addDays(t.startDate, Math.ceil(t.dayUsed) - 1);
        t.rangeSource = 'dayUsed';
        t.effectiveDays = t.dayUsed;
      } else if (t.etaDays > 0) {
        // Rule 3: fallback to ETA Man Day
        t.endDate     = addDays(t.startDate, Math.ceil(t.etaDays) - 1);
        t.rangeSource = 'eta';
        t.effectiveDays = t.etaDays;
      } else {
        // Rule 4: no duration — show as 1-day marker
        t.endDate     = new Date(t.startDate);
        t.rangeSource = 'single';
        t.effectiveDays = 1;
      }
    });

    // Auto-queue: tasks with etaDays but no startDate — append after last known end per PIC
    const picLastEnd = {};
    // First pass: track latest end per PIC from scheduled tasks
    tasks.filter(t => t.startDate).forEach(t => {
      const key = (t.pic || '__none__').toLowerCase();
      if (!picLastEnd[key] || t.endDate > picLastEnd[key]) picLastEnd[key] = t.endDate;
    });

    // Second pass: auto-queue tasks without startDate that have etaDays
    tasks.filter(t => !t.startDate && t.etaDays > 0).forEach(t => {
      const key = (t.pic || '__none__').toLowerCase();
      const after = picLastEnd[key] ? addDays(picLastEnd[key], 1) : new Date();
      t.startDate     = stripTime(after);
      t.endDate       = addDays(t.startDate, Math.ceil(t.etaDays) - 1);
      t.effectiveDays = t.etaDays;
      t.rangeSource   = 'auto';
      t.autoQueued    = true;
      picLastEnd[key] = t.endDate;
    });

    // Classify unscheduled = no startDate AND no etaDays
    const scheduled   = tasks.filter(t => t.startDate);
    const unscheduled = tasks.filter(t => !t.startDate);

    // Build Gantt
    document.getElementById('status-dot').style.background = '#36d399';
    renderAll(tasks, scheduled, unscheduled, rawHeaders, cols);

  } catch(err) {
    document.getElementById('status-dot').style.background = '#f7604f';
    document.getElementById('main').innerHTML = `
      <div class="state-overlay">
        <div class="error-box">
          <strong>Failed to load Google Sheet</strong><br><br>
          ${err.message}<br><br>
          Make sure the sheet is <b>publicly accessible</b> (Share → Anyone with link → Viewer).
        </div>
      </div>`;
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderAll(allTasks, scheduled, unscheduled, headers, cols) {
  const main = document.getElementById('main');

  if (scheduled.length === 0) {
    main.innerHTML = `
      <div class="state-overlay">
        <div class="error-box">No scheduled tasks found.<br>Make sure tasks have a <b>Start At</b> or <b>ETA Man Day</b>.</div>
      </div>
      ${renderUnscheduledHTML(unscheduled)}`;
    return;
  }

  // Date range
  const today = stripTime(new Date());
  let minDate = new Date(Math.min(...scheduled.map(t => t.startDate)));
  let maxDate = new Date(Math.max(...scheduled.map(t => t.endDate || t.startDate)));
  // Pad
  minDate = addDays(minDate, -3);
  maxDate = addDays(maxDate, 5);

  // Build day array
  const days = [];
  for (let d = new Date(minDate); d <= maxDate; d = addDays(d, 1)) days.push(new Date(d));

  // Group by month for header
  const months = [];
  let curMonth = null;
  days.forEach((d, i) => {
    const key = `${d.getFullYear()}-${d.getMonth()}`;
    if (key !== curMonth) {
      months.push({ label: d.toLocaleDateString('en-GB',{month:'short',year:'numeric'}), startIdx: i, count: 0 });
      curMonth = key;
    }
    months[months.length-1].count++;
  });

  // Group tasks by PIC
  const picMap = {};
  scheduled.forEach(t => {
    const key = t.pic || '(Unassigned)';
    if (!picMap[key]) picMap[key] = [];
    picMap[key].push(t);
  });

  // Stats
  const doneCount = allTasks.filter(t => (t.status||'').toLowerCase().match(/done|complet|finish/)).length;
  const inProg    = allTasks.filter(t => (t.status||'').toLowerCase().match(/progress|wip/)).length;
  const pics      = Object.keys(picMap).length;

  // Unique status values for legend
  const uniquePics = Object.keys(picMap);

  const totalW = days.length * CELL_W;

  function isWeekend(d) { const wd = d.getDay(); return wd===0||wd===6; }
  function isToday(d)   { return d.toDateString() === today.toDateString(); }

  function dayIdx(d) {
    const stripped = stripTime(d);
    return days.findIndex(dd => dd.toDateString() === stripped.toDateString());
  }

  // Build header cells
  const monthCells = months.map(m =>
    `<div class="month-cell" style="width:${m.count*CELL_W}px">${m.label}</div>`
  ).join('');

  const dayCells = days.map(d =>
    `<div class="day-cell${isWeekend(d)?' weekend':''}${isToday(d)?' is-today':''}">${d.getDate()}</div>`
  ).join('');

  const bgCells = days.map(d =>
    `<div class="timeline-bg-cell${isWeekend(d)?' weekend':''}${isToday(d)?' is-today':''}"></div>`
  ).join('');

  const stripCells = days.map(d =>
    `<div class="pic-stripe-cell${isWeekend(d)?' weekend':''}${isToday(d)?' is-today':''}"></div>`
  ).join('');

  // Today line position
  const todayIdx = dayIdx(today);
  const todayLine = todayIdx >= 0
    ? `<div class="today-line" style="left:${LABEL_W + todayIdx*CELL_W + CELL_W/2}px"></div>`
    : '';

  // Build rows per PIC
  let picGroupsHTML = '';
  uniquePics.forEach(pic => {
    const color = getPicColor(pic);
    const tasks  = picMap[pic];

    const taskRowsHTML = tasks.map(t => {
      const si = dayIdx(t.startDate);
      const ei = dayIdx(t.endDate || t.startDate);
      const barLeft  = si * CELL_W;
      const barWidth = Math.max((ei - si + 1) * CELL_W - 4, 8);

      const sty = statusStyle(t.status);
      const barColor  = color;
      // Store data in global map keyed by unique index — avoids HTML attribute escaping issues
      const bidx = barIdx++;
      BAR_DATA[bidx] = {
        task: t.task, pic: t.pic, status: t.status,
        startDate: fmtDate(t.startDate), endDate: fmtDate(t.endDate),
        etaDays: t.etaDays, dayUsed: t.dayUsed,
        effectiveDays: t.effectiveDays, rangeSource: t.rangeSource,
        notes: t.notes, autoQueued: t.autoQueued
      };

      return `
        <div class="task-row">
          <div class="task-label-cell">
            <div class="task-dot" style="background:${barColor}"></div>
            <span class="task-name" title="${t.task}">${t.task || '<em style="color:var(--muted)">Unnamed</em>'}</span>
            ${t.effectiveDays ? `<span class="task-eta-badge">${t.effectiveDays}d</span>` : ''}
          </div>
          <div class="task-timeline" style="width:${totalW}px">
            ${bgCells}
            <div class="gantt-bar-wrap" style="left:${barLeft}px; width:${barWidth}px"
                 data-bidx="${bidx}"
                 onmouseenter="showTipIdx(event,${bidx})" onmouseleave="hideTip()">
              <div class="gantt-bar ${t.autoQueued?'auto-queued':''}"
                   style="width:100%;background:${barColor}20;border:1.5px solid ${barColor}">
                <span class="gantt-bar-label" style="color:${barColor}">${t.task}</span>
              </div>
            </div>
          </div>
        </div>`;
    }).join('');

    picGroupsHTML += `
      <div class="pic-group">
        <div class="pic-header-row">
          <div class="pic-label">
            <div class="pic-avatar" style="background:${color}22;color:${color};border:1.5px solid ${color}44">${initials(pic)}</div>
            <span class="pic-name">${pic}</span>
            <span class="pic-count">${tasks.length}</span>
          </div>
          <div class="pic-timeline-stripe" style="width:${totalW}px">${stripCells}</div>
        </div>
        ${taskRowsHTML}
      </div>`;
  });

  // Legend
  const legendHTML = uniquePics.map(pic => {
    const color = getPicColor(pic);
    return `<div class="legend-item"><div class="legend-swatch" style="background:${color}"></div>${pic}</div>`;
  }).join('') +
  `<div class="legend-item"><div class="legend-swatch" style="background:linear-gradient(90deg,rgba(255,255,255,.1) 25%,rgba(255,255,255,.07) 25%) repeat,rgba(107,122,154,.15);background-size:8px 8px,auto"></div>Auto-queued</div>` +
  `<div class="legend-item"><div class="legend-swatch" style="background:rgba(247,184,79,.6)"></div>Today</div>`;

  main.innerHTML = `
    <div class="summary-strip">
      <div class="stat-card"><div class="stat-value">${allTasks.length}</div><div class="stat-label">Total Tasks</div></div>
      <div class="stat-card"><div class="stat-value" style="color:var(--success)">${doneCount}</div><div class="stat-label">Completed</div></div>
      <div class="stat-card"><div class="stat-value" style="color:var(--accent)">${inProg}</div><div class="stat-label">In Progress</div></div>
      <div class="stat-card"><div class="stat-value" style="color:var(--warning)">${unscheduled.length}</div><div class="stat-label">Unscheduled</div></div>
      <div class="stat-card"><div class="stat-value">${pics}</div><div class="stat-label">People</div></div>
    </div>

    <div class="section-title">Gantt Chart</div>

    <div class="legend">${legendHTML}</div>

    <div class="gantt-outer">
      <div class="gantt-scroll">
        <div class="gantt-table" style="min-width:${LABEL_W + totalW}px; position:relative;">
          ${todayLine}
          <div class="gantt-header">
            <div class="label-col"><span>PIC / Task</span></div>
            <div class="timeline-cols" style="width:${totalW}px">
              <div class="month-row">${monthCells}</div>
              <div class="day-row">${dayCells}</div>
            </div>
          </div>
          ${picGroupsHTML}
        </div>
      </div>
    </div>

    ${renderUnscheduledHTML(unscheduled)}
  `;

  // Scroll so today is visible
  if (todayIdx >= 0) {
    const el = document.querySelector('.gantt-scroll');
    if (el) {
      const scrollTo = LABEL_W + todayIdx * CELL_W - el.clientWidth / 2;
      el.scrollLeft = Math.max(0, scrollTo);
    }
  }
}

function renderUnscheduledHTML(unscheduled) {
  if (unscheduled.length === 0) return '';

  // Group by PIC
  const picGroups = {};
  unscheduled.forEach(t => {
    const key = t.pic || '(Unassigned)';
    if (!picGroups[key]) picGroups[key] = [];
    picGroups[key].push(t);
  });

  const groupsHTML = Object.entries(picGroups).map(([pic, tasks]) => {
    const color = getPicColor(pic);

    const cardsHTML = tasks.map(t => {
      const sty    = statusStyle(t.status);
      const emoji  = statusEmoji(t.status);
      const hasEta = t.etaDays > 0;
      return `
        <div class="unscheduled-card" style="border-color:${color}30">
          <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${color};border-radius:10px 0 0 10px"></div>
          <div class="uc-top">
            <div class="uc-icon" style="background:${color}18">${emoji}</div>
            <div class="uc-task-name">${t.task || '<span style="color:var(--muted);font-style:italic">Unnamed task</span>'}</div>
          </div>
          <div class="uc-meta">
            ${hasEta
              ? `<span class="uc-chip eta-chip">
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                  ${t.etaDays}d effort
                </span>`
              : `<span class="uc-chip no-eta-chip">
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
                  No estimate
                </span>`}
            ${t.status
              ? `<span class="uc-chip status-chip" style="background:${sty.bg};border-color:${sty.border};color:${sty.text}">${t.status}</span>`
              : ''}
          </div>
          ${t.notes ? `<div style="font-size:11px;color:var(--muted);border-top:1px solid var(--border);padding-top:8px;line-height:1.5">${t.notes}</div>` : ''}
        </div>`;
    }).join('');

    return `
      <div class="uc-pic-group">
        <div class="uc-pic-header">
          <div class="pic-avatar" style="background:${color}22;color:${color};border:1.5px solid ${color}44;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:11px;font-weight:800;flex-shrink:0">${initials(pic)}</div>
          <span style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:${color}">${pic}</span>
          <span style="font-size:10px;color:var(--muted);margin-left:4px">${tasks.length} task${tasks.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="unscheduled-grid">${cardsHTML}</div>
      </div>`;
  }).join('');

  return `
    <div class="unscheduled-section">
      <div class="section-title">Unscheduled Tasks <span style="font-family:'JetBrains Mono';font-size:11px;color:var(--warning);font-weight:400;letter-spacing:0;text-transform:none;margin-left:4px">${unscheduled.length} task${unscheduled.length !== 1 ? 's' : ''} pending scheduling</span></div>
      ${groupsHTML}
    </div>`;
}

// ── TOOLTIP ───────────────────────────────────────────────────────────────────
const tip = document.getElementById('tooltip');
let tipTimer;

function showTipIdx(e, idx) {
  clearTimeout(tipTimer);
  const d = BAR_DATA[idx];
  if (!d) return;
  showTipData(e, d);
}

function showTipData(e, d) {
  const sty = statusStyle(d.status);

  tip.innerHTML = `
    <div class="tooltip-title">${d.task || 'Unnamed Task'}</div>
    <div class="tooltip-grid">
      <span class="tooltip-key">PIC</span>
      <span class="tooltip-val">${d.pic || '—'}</span>
      <span class="tooltip-key">Start</span>
      <span class="tooltip-val">${d.startDate}</span>
      <span class="tooltip-key">End</span>
      <span class="tooltip-val">${d.endDate}</span>
      <span class="tooltip-key">Duration</span>
      <span class="tooltip-val">${d.effectiveDays ? d.effectiveDays + ' day' + (d.effectiveDays > 1 ? 's' : '') : '—'}
        ${d.rangeSource === 'completed' ? '<span style="font-size:9px;color:var(--success);margin-left:4px">● actual</span>' :
          d.rangeSource === 'dayUsed'   ? '<span style="font-size:9px;color:var(--accent);margin-left:4px">● day used</span>' :
          d.rangeSource === 'eta'       ? '<span style="font-size:9px;color:var(--muted);margin-left:4px">● estimated</span>' :
          d.rangeSource === 'auto'      ? '<span style="font-size:9px;color:var(--warning);margin-left:4px">● queued</span>' : ''}
      </span>
      ${d.notes ? `<span class="tooltip-key">Notes</span><span class="tooltip-val" style="font-size:11px">${d.notes}</span>` : ''}
    </div>
    ${d.status ? `<div class="tooltip-status" style="background:${sty.bg};border:1px solid ${sty.border};color:${sty.text}">${d.status}</div>` : ''}
    ${d.autoQueued ? `<div class="tooltip-auto-note">⚡ Auto-queued — no start date set. Scheduled after previous tasks.</div>` : ''}
  `;

  const PAD = 14;
  let x = e.clientX + PAD;
  let y = e.clientY + PAD;
  const tipW = 270;

  if (x + tipW > window.innerWidth - 10) x = e.clientX - tipW - PAD;
  if (y + 200 > window.innerHeight - 10) y = e.clientY - 200 - PAD;

  tip.style.left = x + 'px';
  tip.style.top  = y + 'px';
  tip.classList.add('visible');
}

function hideTip() {
  tipTimer = setTimeout(() => tip.classList.remove('visible'), 80);
}

document.addEventListener('mousemove', e => {
  if (tip.classList.contains('visible')) {
    const PAD = 14, tipW = 270;
    let x = e.clientX + PAD, y = e.clientY + PAD;
    if (x + tipW > window.innerWidth - 10) x = e.clientX - tipW - PAD;
    if (y + 220 > window.innerHeight - 10) y = e.clientY - 220 - PAD;
    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
  }
});

// ── BOOT ─────────────────────────────────────────────────────────────────────
loadData();
</script>
